<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>All Attendance</title>
</head>
<body>

<h2>All Attendance History</h2>
<p><a href="{{ url_for('index') }}">← Back to main page</a></p>

<table>
<tr><th>Date</th><th>Student</th><th>Studio</th><th>Status</th></tr>
{% for r in rows %}
<tr>
  <td>{{ r.date | replace("-", "/") }}</td>
  <td>{{ r.student }}</td>
  <td>{{ r.studio }}</td>
  <td>{{ r.status }}</td>
</tr>
{% endfor %}
</table>

</body>
</html>
