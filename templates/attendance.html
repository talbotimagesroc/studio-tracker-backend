<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Attendance</title>
</head>
<body>

<h2>{{ student.name }} ({{ student.studio }}) — Attendance</h2>

{% if records %}
<ul>
  {% for r in records %}
    <li>
      {{ r.date }} — {{ r.status }}

      <form method="post"
            action="{{ url_for('delete_attendance', attendance_id=r.id) }}"
            style="display:inline;">
        <input type="hidden"
               name="next"
               value="{{ url_for('attendance_history', student_id=student.id) }}">
        <button onclick="return confirm('Delete this attendance record?');">
          Delete
        </button>
      </form>
    </li>
  {% endfor %}
</ul>
{% else %}
<p>No attendance records.</p>
{% endif %}

<p><a href="{{ url_for('index') }}">← Back</a></p>

</body>
</html>
